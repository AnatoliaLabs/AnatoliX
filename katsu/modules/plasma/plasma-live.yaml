builder: dnf

import:
  - ../base/base.yaml
  - ../live/live.yaml
  - ../base/desktop.yaml
  - ../live/readymade.yaml
  - plasma.yaml

distro: Ultramarine Linux Cheetah (Plasma Edition)

out_file: ultramarine-plasma-rawhide-live.iso

scripts:
  post:
    - id: plasma-live
      name: Set up Plasma Live
      file: ./plasma-live.sh

bootloader: grub

kernel_cmdline: "quiet rhgb"

iso:
  volume_id: UM-Kd-Live

dnf:
  releasever: rawhide
  exec: dnf5
