scripts:
  post:
    - id: live-setup
      name: Set up Live Image
      file: live.sh
dnf:
  releasever: 43
  exec: dnf
  exclude:
    - fedora-release*
    - generic-release*
    - fedora-bookmarks
    - fcoe-utils
    - device-mapper-multipath
    - gnome-boxes
    - deepin-wallpapers
    - pipewire-codec-aptx # somehow pulled in but not required by anything?
  packages:
    - glibc-all-langpacks
    - dracut-live
    - dracut-network
    - dracut-squash
    - libblockdev-nvdimm
    - isomd5sum
    - orca
    # #94
    - taidan
    - espeak-ng
    - speech-dispatcher-espeak-ng
    - julietaula-montserrat-fonts
    - ultramarine-backgrounds
    - initscripts
    - chkconfig
    - gjs
    - util-linux-user
    - livesys-scripts
    - rsync
    - htop
    - vim
    - nano
    # for drivers and other stuff
    - kernel
    - kernel-devel-matched
    # UMSS
    - um
    - dive
    - mkfstab
    - dracut-strip-trigger
