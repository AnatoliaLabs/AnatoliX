builder: dnf

dnf:
  releasever: 42
  exec: dnf4
  packages:
    - asahi-platform-metapackage
    - asahi-repos
    - kernel-16k
    - kernel-16k-modules
    - kernel-16k-modules-core
    - kernel-16k-modules-extra
    - kernel-16k-core
  exclude:
    - kernel
    - kernel-core
  exclude:
    - fedora-logos*
    - fedora-*logos*
scripts:
  post:
    - id: setup-m1n1
      name: Setup m1n1 in EFI
      file: setup-m1n1.sh
