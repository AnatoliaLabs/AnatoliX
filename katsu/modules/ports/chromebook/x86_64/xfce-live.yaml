builder: dnf

import:
  - ../chromebook.yaml
  - chromebook-disk-x86_64.yaml
  - ../../../live/readymade.yaml
  - ../../../live/live.yaml
  - ../../../xfce/xfce.yaml
  - ../../../base/desktop.yaml
  - ../../../base/base.yaml

distro: Ultramarine Linux 41 Xfce (Chromebook Edition)

out_file: ultramarine-cbe-xfce-42-x86_64.iso

bootloader: grub

kernel_cmdline: "quiet rhgb"

iso:
  volume_id: UM-XFCE-Live

scripts:
  post:
    - id: xfce-live
      name: Set up XFCE Live
      file: ../../../xfce/xfce-live.sh

dnf:
  releasever: 42
  exec: dnf4
