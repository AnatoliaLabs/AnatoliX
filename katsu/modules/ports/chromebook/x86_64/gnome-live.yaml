builder: dnf

import:
  - ../chromebook.yaml
  - chromebook-disk-x86_64.yaml
  - ../../../live/readymade.yaml
  - ../../../live/live.yaml
  - ../../../gnome/gnome.yaml
  - ../../../base/desktop.yaml
  - ../../../base/base.yaml

distro: Ultramarine Linux 42 GNOME (Chromebook Edition)

out_file: ultramarine-cbe-gnome-42-x86_64.iso

bootloader: grub

kernel_cmdline: "quiet rhgb"

iso:
  volume_id: UM-GNOME-Live

scripts:
  post:
    - id: gnome-live
      name: Set up GNOME Live
      file: ../../../gnome/gnome-live.sh

dnf:
  releasever: 42
  exec: dnf4
