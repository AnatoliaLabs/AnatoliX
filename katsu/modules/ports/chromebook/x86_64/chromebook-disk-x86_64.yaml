#     groups:
#       - wheel

import:
  - ../../../base/base-disk.yaml

dnf:
  releasever: 41
  exec: dnf4

scripts:
  post:
    - id: grub
      name: Set up GRUB
      file: ../../../base/grub-setup.sh
    - id: multi-user
      priority: 60
      name: Set default target to multi-user
      file: ../../../base/default-target.sh

disk:
  size: 6GB
  partitions:
    - label: Submarine
      type: fe3a2a5d-4f32-41a7-b725-accc3285a309
      size: 64MB
      filesystem: ext4
      mountpoint: /submarine

    - label: boot
      type: xbootldr
      size: 1GB
      filesystem: ext4
      mountpoint: /boot

    - label: root
      flags:
        - grow-fs
      type: root
      # size: 2.5MB
      filesystem: ext4
      mountpoint: /
