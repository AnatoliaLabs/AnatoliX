builder: dnf

import:
  - ../../base/base.yaml
  - ../../live/anaconda.yaml
  - ../../live/live.yaml
  - ../../gnome/gnome.yaml
  - surface.yaml

distro: Ultramarine GNOME 43

out_file: ultramarine-gnome-43-surface.iso

bootloader: grub

kernel_cmdline: "quiet rhgb"

iso:
  volume_id: UM-Gn-Live

scripts:
  post:
    - id: gnome-live
      name: Set up GNOME Live
      file: ../../gnome/./gnome-live.sh
    - id: gnome-live-anaconda
      name: Set up GNOME Live (for Anaconda)
      file: gnome-live-anaconda.sh

dnf:
  releasever: 43
  exec: dnf
