builder: dnf

import:
  - ../../base/base.yaml
  - ../../live/anaconda.yaml
  - ../../live/live.yaml
  - ../../flagship/flagship.yaml
  - surface.yaml

distro: Ultramarine Linux 43 (Flagship Edition)

out_file: ultramarine-flagship-43-surface.iso

bootloader: grub

kernel_cmdline: "quiet rhgb"

iso:
  volume_id: UM-Flagship-Live

scripts:
  post:
    - id: flagship-live
      name: Set up Flagship Live
      file: ../../flagship/./flagship-live.sh

dnf:
  releasever: 43
  exec: dnf4
