builder: dnf

import:
  - ../../base/base.yaml
  - ../../live/anaconda.yaml
  - ../../live/live.yaml
  - ../../plasma/plasma.yaml
  - surface.yaml

distro: Ultramarine Linux Cheetah (Plasma Edition)

out_file: ultramarine-plasma-rawhide-surface.iso

scripts:
  post:
    - id: plasma-live
      name: Set up Plasma Live
      file: ../../plasma/./plasma-live.sh

bootloader: grub

kernel_cmdline: "quiet rhgb"

iso:
  volume_id: UM-Kd-Live

dnf:
  releasever: rawhide
  exec: dnf5
