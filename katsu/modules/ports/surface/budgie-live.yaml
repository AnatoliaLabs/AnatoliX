builder: dnf

import:
  - ../../base/base.yaml
  - ../../live/anaconda.yaml
  - ../../live/live.yaml
  - ../../budgie/budgie.yaml
  - surface.yaml

distro: Ultramarine Linux 43 (Budgie Edition)

out_file: ultramarine-budgie-43-surface.iso

bootloader: grub

kernel_cmdline: "quiet rhgb"

iso:
  volume_id: UM-budgie-Live

scripts:
  post:
    - id: budgie-live
      name: Set up Budgie Live
      file: ../../budgie/./budgie-live.sh

dnf:
  releasever: 43
  exec: dnf5
