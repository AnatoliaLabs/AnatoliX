builder: dnf

import:
  - ../base/base.yaml
  - ../base/desktop.yaml
  - ../live/live.yaml
  - ../live/anaconda.yaml
  - budgie.yaml

distro: Ultramarine Linux Cheetah (Budgie Edition)

out_file: ultramarine-budgie-rawhide-live-anaconda.iso

bootloader: grub

kernel_cmdline: "quiet rhgb"

iso:
  volume_id: UM-Budgie-Live-Anaconda

scripts:
  post:
    - id: budgie-live
      name: Set up Budgie Live
      file: ./budgie-live.sh
    - id: budgie-live-anaconda
      name: Set up Budgie Live (for Anaconda)
      file: ./budgie-live-anaconda.sh

dnf:
  releasever: rawhide
  exec: dnf5
