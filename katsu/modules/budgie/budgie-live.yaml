builder: dnf

import:
  - ../base/base.yaml
  - ../live/live.yaml
  - ../base/desktop.yaml
  - ../live/readymade.yaml
  - budgie.yaml

distro: Ultramarine Linux Cheetah (Budgie Edition)

out_file: ultramarine-budgie-rawhide-live.iso

bootloader: grub

kernel_cmdline: "quiet rhgb"

iso:
  volume_id: UM-Budgie-Live

scripts:
  post:
    - id: budgie-live
      name: Set up Budgie Live
      file: ./budgie-live.sh

dnf:
  releasever: rawhide
  exec: dnf5
