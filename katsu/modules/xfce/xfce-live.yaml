builder: dnf

import:
  - ../base/base.yaml
  - ../live/live.yaml
  - ../base/desktop.yaml
  - ../live/readymade.yaml
  - xfce.yaml

distro: Ultramarine Linux 43 (Xfce Edition)

out_file: ultramarine-xfce-43-live.iso

bootloader: grub

kernel_cmdline: "quiet rhgb"

iso:
  volume_id: UM-Xfce-Live

scripts:
  post:
    - id: xfce-live
      name: Set up XFCE Live
      file: ./xfce-live.sh

dnf:
  releasever: 43
  exec: dnf
