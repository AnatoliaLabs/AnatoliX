builder: dnf

import:
  - ../base/base.yaml
  - ../live/live.yaml
  - ../base/desktop.yaml
  - ../live/readymade.yaml
  - flagship.yaml

distro: Ultramarine Linux 43 (Flagship Edition)

out_file: ultramarine-flagship-43-live.iso

bootloader: grub

kernel_cmdline: "quiet rhgb"

iso:
  volume_id: UM-Flagship-Live

scripts:
  post:
    - id: flagship-live
      name: Set up Flagship Live
      file: ./flagship-live.sh

dnf:
  releasever: 43
  exec: dnf5
