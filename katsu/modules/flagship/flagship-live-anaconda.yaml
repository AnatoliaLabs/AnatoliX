builder: dnf

import:
  - ../base/base.yaml
  - ../base/desktop.yaml
  - ../live/live.yaml
  - ../live/anaconda.yaml
  - flagship.yaml

distro: Ultramarine Linux 43 (Flagship Edition)

out_file: ultramarine-flagship-43-live-anaconda.iso

bootloader: grub

kernel_cmdline: "quiet rhgb"

iso:
  volume_id: UM-Flagship-Live-Anaconda

scripts:
  post:
    - id: flagship-live
      name: Set up Flagship Live
      file: ./flagship-live.sh
    - id: flagship-live-anaconda
      name: Set up Flagship Live (for Anaconda)
      file: ./flagship-live-anaconda.sh

dnf:
  releasever: 43
  exec: dnf5
