name: Build Docker images
env:
  KATSU_BUILD_TASK_NAME: "Build image"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
on:
  push:
    branches: ["um43"]
  workflow_dispatch:
  pull_request:
    branches: ["um43"]

jobs:
  #### DOCKER ######

  docker:
    strategy:
      fail-fast: false
      matrix:
        variant:
          - base/base-docker-x86_64
          - base/base-docker-aarch64
          - base/base-docker-riscv64

    outputs:
      artifact: ${{ matrix.variant }}
      # ubuntu-latest unless we're building aarch64
    runs-on: ${{ endsWith(matrix.variant, '-aarch64') && 'ubuntu-24.04-arm' || endsWith(matrix.variant, '-riscv64') && 'banana-pi-f3' || 'ubuntu-latest' }}
    container:
      image: ghcr.io/fyralabs/katsu:main
      # Pass /dev from host to container
      # Very hacky, but it works
      # Microsoft/Github, if you're reading this,
      # I'm sorry.
      options: --privileged -v /dev:/dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: sanitize artifact name
        run: |
          name=$(echo ${{ matrix.variant }} | sed 's/\//-/g')

          # set github variable
          echo artifact=$name >> $GITHUB_ENV
          # get architecture
          # e.g. base/base-docker-x86_64 -> x86_64
          echo arch=$(echo ${{ matrix.variant }} | cut -d'-' -f3) >> $GITHUB_ENV
      - name: ${{ env.KATSU_BUILD_TASK_NAME }}
        run: |
          pushd katsu
          katsu --output=folder modules/${{ matrix.variant }}.yaml

          if [ ${{ env.arch }} == "x86_64" ]; then
            host_arch="amd64"
          elif [ ${{ env.arch }} == "aarch64" ]; then
            host_arch="arm64"
          elif [ ${{ env.arch }} == "riscv64" ]; then
            host_arch="riscv64"
          fi

          # tarball katsu-work/chroot then import using podman with tag ghcr.io/ultramarine-linux/ultramarine:43
          tar -C katsu-work/chroot -c . | podman import --change='CMD ["/usr/bin/bash"]' - ghcr.io/ultramarine-linux/ultramarine:43 --arch $host_arch
          podman save --format oci-archive ghcr.io/ultramarine-linux/ultramarine:43 --output katsu-work/image/katsu.tar.xz
          popd

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.artifact }}-docker
          path: katsu/katsu-work/image/*.tar.xz
          compression-level: 0

      #### DOCKER PUSH ######

  docker-push:
    runs-on: ubuntu-latest
    needs: docker
    if: github.event_name != 'pull_request'

    steps:
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y buildah
      - name: Log in to ghcr.io
        uses: redhat-actions/podman-login@v1
        with:
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
          registry: ghcr.io

      # how do i combine those two images into one multiarch tag

      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Publish to registry
        run: |
          set -x
          MANIFEST="ghcr.io/ultramarine-linux/ultramarine"
          RELEASE="43"
          ls -lR
          buildah manifest create $MANIFEST
          buildah manifest add $MANIFEST oci-archive:base-base-docker-x86_64-docker/katsu.tar.xz --arch amd64
          buildah manifest add $MANIFEST oci-archive:base-base-docker-aarch64-docker/katsu.tar.xz --arch arm64
          buildah manifest add $MANIFEST oci-archive:base-base-docker-riscv64-docker/katsu.tar.xz --arch riscv64
          # also tag as latest
          buildah tag $MANIFEST $MANIFEST:latest || :
          buildah manifest push --all --format v2s2 $MANIFEST docker://$MANIFEST:$RELEASE

  docker-layer:
    permissions:
      contents: read
      packages: write
    runs-on: ubuntu-latest
    needs: docker-push
    strategy:
      fail-fast: true
      matrix:
        version:
          - 43
        docker:
          - dockerfile: dockerfiles/devtools.dockerfile
            image: ghcr.io/ultramarine-linux/ultramarine-devtools
          #- dockerfile: dockerfiles/gitpod.dockerfile
          # image: ghcr.io/ultramarine-linux/ultramarine-gitpod

    steps:
      - name: Checkout
        uses: actions/checkout@v2
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log into registry ${{ env.REGISTRY }}
        uses: docker/login-action@v2.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build images
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.docker.dockerfile }}
          platforms: linux/amd64,linux/arm64,linux/riscv64
          push: true
          tags: |
            ${{ matrix.docker.image }}:${{ matrix.version }}
            ${{ matrix.docker.image }}:latest
          build-args: |
            RELEASE=${{ matrix.version }}

  #### LIVE ISO ####
